[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hercules"
version = "1.6.0"
description = "Hercules — Claude Code plugin with AI-assisted delivery methodology enforcement"
readme = "README.md"
license = { text = "AGPL-3.0" }
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
dev = [
    "tiktoken>=0.7.0",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-mock>=3.14",
    "mutmut>=2.4,<3",
]

# No package is shipped — the deliverable is the Claude Code plugin under plugin/.
# The editable install exists only to pull in the dev/test toolchain.
[tool.setuptools]
py-modules = []

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
# pytest's DEFAULT norecursedirs includes "build" and "dist" — so a test dir named
# tests/build/ is silently skipped during recursion (it collects only when named
# explicitly). We override to the stock list MINUS "build" so tests/build/ (the
# compiler suite) actually runs under `pytest tests/`. Guarded by
# tests/test_collection_integrity.py so this can never silently regress.
norecursedirs = ["*.egg", ".*", "_darcs", "CVS", "dist", "node_modules", "venv", "{arch}"]

[tool.mutmut]
# Pure transform layer (parse/render/model_map/serialize/manifests/version_targets) + hooks + metrics
# carry the mutation gate; the FS boundary (cli/layout) is round-trip-covered and under the branch-
# coverage gate (make test's --cov=scripts/build, ~97%), but not mutated — its shutil/tempfile/argparse
# mutants are largely equivalent and would only add noise to the kill rate.
paths_to_mutate = "tests/metrics/,src/targets/claude-code/hooks/,scripts/build/parse.py,scripts/build/render.py,scripts/build/model_map.py,scripts/build/serialize.py,scripts/build/manifests.py,scripts/build/version_targets.py"
paths_to_exclude = "test_*.py,__init__.py,conftest.py"
backup = false
runner = "python -m pytest tests/ -x -q --tb=no --no-header"
tests_dir = "tests/"

[tool.coverage.run]
omit = ["tests/**/test_*.py", "tests/**/__init__.py", "tests/**/conftest.py"]
