[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hercules"
version = "1.0.0"
description = "Hercules — Claude Code plugin with AI-assisted delivery methodology enforcement"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "platformdirs>=4.0",
    "tiktoken>=0.7.0",
]

[project.scripts]
hercules = "hercules.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-mock>=3.14",
    "mutmut>=2.4,<3",
]

[tool.setuptools.packages.find]
include = ["hercules*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.mutmut]
paths_to_mutate = "hercules/"
backup = false
runner = "python -m pytest tests/ -x -q --tb=no --no-header"
tests_dir = "tests/"
