[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hercules"
version = "1.6.0"
description = "Hercules — Claude Code plugin with AI-assisted delivery methodology enforcement"
readme = "README.md"
license = { text = "AGPL-3.0" }
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
dev = [
    "tiktoken>=0.7.0",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-mock>=3.14",
    "mutmut>=2.4,<3",
]

# No package is shipped — the deliverable is the Claude Code plugin under plugin/.
# The editable install exists only to pull in the dev/test toolchain.
[tool.setuptools]
py-modules = []

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.mutmut]
paths_to_mutate = "tests/metrics/,plugin/hooks/"
paths_to_exclude = "test_*.py,__init__.py,conftest.py"
backup = false
runner = "python -m pytest tests/ -x -q --tb=no --no-header"
tests_dir = "tests/"

[tool.coverage.run]
omit = ["tests/**/test_*.py", "tests/**/__init__.py", "tests/**/conftest.py"]
