name: Release

# Every merge to main cuts a release. The bump is derived from conventional commits (standard SemVer):
#   - feature  (`feat:`)            → MINOR
#   - fix      (`fix:`)             → PATCH
#   - anything else                 → MINOR   (default_bump: minor)
#   - a BREAKING change             → MAJOR   (only when flagged: a `!` after the type, e.g. `feat!:`,
#                                              or a `BREAKING CHANGE:` footer — never a plain `feat:`)
# The new version is written into every canonical manifest (pyproject.toml, the Claude plugin
# manifest, and package.json), committed back with [skip ci], tagged v{version}, and published as a
# GitHub Release whose notes are the aggregated commits since the previous release.
#
# Notes:
#   - The bump commit carries [skip ci], so it does not re-trigger this workflow.
#   - The job pushes directly to main; if main is protected, allow this workflow
#     (or a PAT) to bypass the rule, or relax the protection.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency: release

jobs:
  release:
    # Run only when CI passed; also skip the workflow's own release bump commit.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      # 1-pre. Detect whether this is the first release (no v* tags yet) and
      #        capture the previous tag so git log can scope the commit range.
      - name: Detect first release
        id: meta
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "is_first=true"  >> $GITHUB_OUTPUT
            echo "prev_tag="      >> $GITHUB_OUTPUT
          else
            echo "is_first=false" >> $GITHUB_OUTPUT
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi

      # 1. Compute the next version + changelog from conventional commits (no tag yet).
      - name: Compute next version
        id: bump
        # Pinned to the full COMMIT SHA (not the mutable v6.2 tag) — this job holds contents:write
        # and can push to main, so a re-pointed upstream tag must not become code execution here.
        # NB: v6.2 is an ANNOTATED tag, so the pin must be `git rev-parse v6.2^{commit}`
        # (a22cf08), NOT `git rev-parse v6.2` (d28fa2c, the tag OBJECT — Actions can't resolve it).
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          initial_version: 1.0.0
          custom_tag: ${{ steps.meta.outputs.is_first == 'true' && '1.0.0' || '' }}
          dry_run: true

      # 2. Write the new version into EVERY canonical (source) manifest (pyproject.toml,
      #    src/targets/claude-code/plugin.json, package.json) — the single-source list.
      - name: Bump version files
        run: python scripts/set_version.py "${{ steps.bump.outputs.new_version }}"

      # 2b. Regenerate dist/ so the built + published artifacts carry the new version. The version
      #     lives in src/ (see VERSION_TARGETS); without this rebuild the committed dist/ would keep
      #     the old version and fail the drift gate on the next unrelated push.
      - name: Rebuild dist/ to propagate the version
        run: python -m scripts.build.cli --target all

      # 3. Update CHANGELOG.md from git log (all commit subjects, not just conventional).
      #    First release overwrites the file; subsequent releases prepend.
      - name: Update CHANGELOG
        env:
          NEW_TAG:  ${{ steps.bump.outputs.new_tag }}
          PREV_TAG: ${{ steps.meta.outputs.prev_tag }}
          IS_FIRST: ${{ steps.meta.outputs.is_first }}
        run: python scripts/update_changelog.py

      # 4. Commit the bump + tag it (the tag points at the bumped commit).
      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage every file the canonical version list touches — no hardcoded manifest paths,
          # so a new target added to VERSION_TARGETS is committed automatically. Also stage dist/,
          # regenerated in step 2b so the published artifacts carry the bumped version.
          FILES=$(python -c "from scripts.build.version_targets import VERSION_TARGETS; print(' '.join(rel for rel, _ in VERSION_TARGETS))")
          git add $FILES dist CHANGELOG.md
          git commit -m "chore(release): ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push --follow-tags

      # 5. Publish the GitHub Release with the aggregated notes.
      - name: GitHub Release
        # Pinned to a full commit SHA (not the mutable v1 major tag) — same supply-chain reason.
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          body: ${{ steps.bump.outputs.changelog }}

      # 6. Publish the OpenCode plugin to npm (primary channel). The working tree is at the
      #    bumped commit, so package.json already carries the new version. `files: ["dist/opencode"]`
      #    scopes the tarball. Skipped automatically if NPM_TOKEN is not configured.
      #
      #    Presence is checked in its OWN step (emitting only a boolean output) rather than a
      #    job-level `env: NPM_TOKEN`, so the credential is never in scope for the third-party
      #    tag/release actions above — only this check and the publish step below see it.
      - name: Check npm publish credentials
        id: npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "enabled=true"  >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node for npm publish
        if: steps.npm.outputs.enabled == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: npm publish
        if: steps.npm.outputs.enabled == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
