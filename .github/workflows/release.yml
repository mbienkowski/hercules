name: Release

# Every merge to main cuts a release. The bump is derived from conventional commits (standard SemVer):
#   - feature  (`feat:`)            → MINOR
#   - fix      (`fix:`)             → PATCH
#   - anything else                 → MINOR   (default_bump: minor)
#   - a BREAKING change             → MAJOR   (only when flagged: a `!` after the type, e.g. `feat!:`,
#                                              or a `BREAKING CHANGE:` footer — never a plain `feat:`)
# The new version is written into BOTH pyproject.toml and the plugin
# manifest, committed back with [skip ci], tagged v{version}, and published as a
# GitHub Release whose notes are the aggregated commits since the previous release.
#
# Notes:
#   - The bump commit carries [skip ci], so it does not re-trigger this workflow.
#   - The job pushes directly to main; if main is protected, allow this workflow
#     (or a PAT) to bypass the rule, or relax the protection.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency: release

jobs:
  release:
    # Run only when CI passed; also skip the workflow's own release bump commit.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    # Exposed at job level so the npm-publish steps can gate on its presence in `if:`
    # (secrets aren't directly readable in step conditions).
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      # 1-pre. Detect whether this is the first release (no v* tags yet) and
      #        capture the previous tag so git log can scope the commit range.
      - name: Detect first release
        id: meta
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "is_first=true"  >> $GITHUB_OUTPUT
            echo "prev_tag="      >> $GITHUB_OUTPUT
          else
            echo "is_first=false" >> $GITHUB_OUTPUT
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi

      # 1. Compute the next version + changelog from conventional commits (no tag yet).
      - name: Compute next version
        id: bump
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: minor
          initial_version: 1.0.0
          custom_tag: ${{ steps.meta.outputs.is_first == 'true' && '1.0.0' || '' }}
          dry_run: true

      # 2. Write the new version into EVERY canonical manifest (pyproject.toml,
      #    dist/claude-code plugin.json, package.json) — the single-source list.
      - name: Bump version files
        run: python scripts/set_version.py "${{ steps.bump.outputs.new_version }}"

      # 3. Update CHANGELOG.md from git log (all commit subjects, not just conventional).
      #    First release overwrites the file; subsequent releases prepend.
      - name: Update CHANGELOG
        env:
          NEW_TAG:  ${{ steps.bump.outputs.new_tag }}
          PREV_TAG: ${{ steps.meta.outputs.prev_tag }}
          IS_FIRST: ${{ steps.meta.outputs.is_first }}
        run: python scripts/update_changelog.py

      # 4. Commit the bump + tag it (the tag points at the bumped commit).
      - name: Commit, tag, push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage every file the canonical version list touches — no hardcoded manifest paths,
          # so a new target added to VERSION_TARGETS is committed automatically.
          FILES=$(python -c "from scripts.build.version_targets import VERSION_TARGETS; print(' '.join(rel for rel, _ in VERSION_TARGETS))")
          git add $FILES CHANGELOG.md
          git commit -m "chore(release): ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push --follow-tags

      # 5. Publish the GitHub Release with the aggregated notes.
      - name: GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          body: ${{ steps.bump.outputs.changelog }}

      # 6. Publish the OpenCode plugin to npm (primary channel). The working tree is at the
      #    bumped commit, so package.json already carries the new version. `files: ["dist/opencode"]`
      #    scopes the tarball. Skipped automatically if NPM_TOKEN is not configured.
      - name: Set up Node for npm publish
        if: ${{ env.NPM_TOKEN != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: npm publish
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
