name: CI

# Two triggers, two meanings — not a duplicate: a push run tests the BRANCH TIP on every
# commit (instant feedback, PR or not), a pull_request run tests the MERGE PREVIEW (the
# branch merged into its PR base — catches conflict-adjacent breakage the tip can't show).
# Deliberately NOT restricted to `branches: [main]`: this repo stacks PRs (feature -> feature
# -> main), and a merge-preview check is exactly as valuable at an intermediate stack level as
# it is at the final one — restricting it to main-based PRs would silently skip pull_request-
# gated jobs (mutation, smoke) on every stacked PR, which is most of them.
# The expensive mutation job stays gated to pull_request/main below.
on:
  push:
    branches: ["**"]
  pull_request:

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Build gate — regenerate dist/ and prove it matches what's committed ──────
  # Runs FIRST: a src/ edit pushed without a rebuild fails here (drift), before any
  # test burns minutes. Also proves the build is deterministic (two runs byte-equal)
  # and that dist/ is tracked, not silently git-ignored.
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Drift gate — committed dist/ must match a fresh build
        run: python -m scripts.build.cli --target all --check

      - name: Determinism gate — two builds are byte-identical
        run: |
          python -m scripts.build.cli --target all
          A=$(mktemp -d); cp -a dist "$A/dist"
          git checkout -- dist
          python -m scripts.build.cli --target all
          diff -r "$A/dist" dist && echo "build is deterministic"
          git checkout -- dist

      - name: Untracked-dist guard — dist/ is tracked, nothing left un-committed
        run: |
          if git check-ignore -q dist; then
            echo "::error::dist/ is git-ignored — tags would snapshot an empty tree"; exit 1
          fi
          python -m scripts.build.cli --target all
          if [ -n "$(git status --porcelain --untracked-files=all dist)" ]; then
            echo "::error::dist/ has uncommitted output — run 'make build' and commit it"
            git status --porcelain --untracked-files=all dist; exit 1
          fi

  # ── Tests — always, on every branch ─────────────────────────────────────────
  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Cache tiktoken encodings
        uses: actions/cache@v6
        with:
          path: ~/.cache/tiktoken
          key: tiktoken-cl100k

      - name: Run tests with coverage
        run: make test
        env:
          TIKTOKEN_CACHE_DIR: /home/runner/.cache/tiktoken

  # ── Mutation testing — every commit on PR branches (+ main), after the quick gates ────
  # Runs mutmut against the pure build layer (scripts/build/*) + hooks + tests/metrics/ and gates on a 90% kill rate. Runs on the
  # pull_request event (every commit pushed to a branch with an open PR) and on
  # main pushes (post-merge) — so feature-branch commits without a PR don't
  # burn CI minutes, and a SHA is never mutation-tested twice. Releases are cut
  # separately by release.yml on every merge to main.
  mutation:
    name: Mutation
    # Gate the expensive (~40 min) job behind BOTH quick gates — a red test or a red
    # validate stops it before it burns minutes, and release (which needs the whole
    # workflow green) is unaffected.
    needs: [test, validate]
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Cache tiktoken encodings
        uses: actions/cache@v6
        with:
          path: ~/.cache/tiktoken
          key: tiktoken-cl100k

      - name: Run mutation tests
        run: make test-mutation
        env:
          TIKTOKEN_CACHE_DIR: /home/runner/.cache/tiktoken

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mutmut-results
          path: mutmut-results.txt

  # ── Ecosystem smoke checks — do the built plugins actually install/load in the real ─────
  # Claude Code and OpenCode binaries, not just look correct on disk? Exploratory: same trigger
  # scope as mutation (every PR commit + main, not every WIP branch push) so it doesn't burn
  # minutes where it isn't needed yet, and continue-on-error so a CLI-side regression or an
  # upstream network hiccup can never block a merge — read the uploaded smoke-results artifact
  # to see the raw claude/opencode subprocess output behind a red run.
  smoke:
    name: Ecosystem smoke checks
    needs: [build]
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      # Pinned to the exact versions verified locally when these checks were written, so a
      # breaking release upstream can't turn this exploratory job red without warning.
      - name: Install Claude Code CLI
        run: |
          for i in 1 2 3; do
            timeout 120 npm install -g @anthropic-ai/claude-code@2.1.214 && break
            echo "::warning::npm install of claude-code failed (attempt $i/3), retrying..."
            sleep $((i * 5))
          done
          claude --version

      - name: Install OpenCode CLI
        run: |
          for i in 1 2 3; do
            timeout 120 npm install -g opencode-ai@1.18.3 && break
            echo "::warning::npm install of opencode-ai failed (attempt $i/3), retrying..."
            sleep $((i * 5))
          done
          opencode --version

      - name: Run live CLI smoke checks
        run: make test-smoke 2>&1 | tee smoke-results.txt
        env:
          DISABLE_AUTOUPDATER: "1"
          CLAUDE_CODE_ENABLE_TELEMETRY: "0"

      - name: Annotate a red run
        if: failure()
        run: |
          echo "::error::Ecosystem smoke checks failed — a built plugin did not install/load the way a real CLI session would. Download the smoke-results artifact for the raw claude/opencode subprocess output. If the failure mentions issues/15, that's the known, already-diagnosed OpenCode loader bug flipping from xfail to a real failure (i.e. it's either newly fixed and the xfail marker needs removing, or it's a new regression in the same area) — anything else is an unreviewed finding."

      - name: Upload smoke check results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: smoke-results
          path: smoke-results.txt

  # ── Validate the plugin package — manifests + single-source version ─────────
  # Gates packaging itself (marketplace-validate + version-check). Runs without a
  # Claude binary; the end-to-end install smoke stays an opt-in manual check.
  validate:
    name: Validate plugin package
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Validate manifests and single-source version
        run: |
          python - <<'PY'
          import json
          from scripts.build.version_targets import check_in_sync, read_versions
          mk = json.load(open(".claude-plugin/marketplace.json"))
          assert any(p.get("name") == "hercules" for p in mk["plugins"]), \
              "marketplace.json must list the hercules plugin"
          # Single-source version: every canonical manifest agrees (raises on drift).
          check_in_sync()
          print("plugin package valid; version", set(read_versions().values()).pop())
          PY
