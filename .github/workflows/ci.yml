name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Tests — always, on every branch ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: make test

  # ── Mutation testing — every commit on PR branches (+ main), after tests ────
  # Runs mutmut against hercules/ and gates on a 90% kill rate. Runs on the
  # pull_request event (every commit pushed to a branch with an open PR) and on
  # main pushes (the release gate) — so feature-branch commits without a PR don't
  # burn CI minutes, and a SHA is never mutation-tested twice.
  mutation:
    name: Mutation
    needs: [test]
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mutation tests
        run: make test-mutation

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-results
          path: mutmut-results.txt
