name: CI

# Two triggers, two meanings — not a duplicate: a push run tests the BRANCH TIP on every
# commit (instant feedback, PR or not), a pull_request run tests the MERGE PREVIEW (the
# branch merged into its PR base — catches conflict-adjacent breakage the tip can't show).
# Deliberately NOT restricted to `branches: [main]`: this repo stacks PRs (feature -> feature
# -> main), and a merge-preview check is exactly as valuable at an intermediate stack level as
# it is at the final one — restricting it to main-based PRs would silently skip pull_request-
# gated jobs (mutation, smoke) on every stacked PR, which is most of them.
# The expensive mutation job stays gated to pull_request/main below.
on:
  push:
    branches: ["**"]
  pull_request:

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege by default: CI reads code, holds no secrets, and needs no write scope.
# A job that ever needs more raises it locally; release.yml owns the privileged path.
permissions:
  contents: read

defaults:
  run:
    shell: bash

# Job graph (cheap -> pricey, so a cheap failure fails fast before an expensive job pays out):
#
#   build ──┬─> test ─────┐
#           ├─> validate ─┼─> mutation   (~40 min, PR/main only — waits for ALL three)
#           └─> smoke ────┘  (network + real CLIs, PR/main only, one leg per ecosystem)
#
# build/validate are seconds; test is minutes; smoke pays for Node + a real-CLI install; mutation
# is the long pole. test, validate, and smoke are peers off `build`; mutation waits for all three to
# SUCCEED (not merely finish — see its `if:`), so a red gate never lets the 40-min job pay out. The
# smoke matrix is a `build` output (derived from the target registry), so there is no separate
# discovery job to keep in sync.
jobs:
  # ── Build gate — regenerate dist/ and prove it matches what's committed ──────
  # Runs FIRST: a src/ edit pushed without a rebuild fails here (drift), before any
  # test burns minutes. Also proves the build is deterministic (two runs byte-equal)
  # and that dist/ is tracked, not silently git-ignored. Emits the smoke matrix (one leg per
  # registered ecosystem, from src/targets/<eco>/smoke.json) so `smoke` needs no discovery job.
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      # Drift (committed dist/ == fresh build), determinism (two builds byte-equal), and the
      # untracked-dist guard — all in scripts/ci/build_gates.sh.
      - name: Build gates (drift, determinism, tracked)
        run: make ci-build

      # The smoke matrix, derived from the build's target registry (the single source of truth) and
      # fail-closed on drift/emptiness. A step output here means `smoke` reads it from `needs.build`
      # — no standalone "discover" node to drift out of sync.
      - id: matrix
        name: Assemble the ecosystem smoke matrix (from the target registry)
        run: make smoke-matrix

  # ── Tests — always, on every branch ─────────────────────────────────────────
  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: make install

      - name: Cache tiktoken encodings
        uses: actions/cache@v6
        with:
          path: ~/.cache/tiktoken
          key: tiktoken-cl100k

      - name: Run tests with coverage
        run: make test
        env:
          TIKTOKEN_CACHE_DIR: /home/runner/.cache/tiktoken

  # ── Validate the plugin package — manifests + single-source version ─────────
  # Gates packaging itself (marketplace-validate + version-check). Runs without a
  # Claude binary; the end-to-end install smoke is the `smoke` job below.
  validate:
    name: Validate plugin package
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Validate manifests and single-source version
        run: make validate

  # ── Ecosystem smoke checks — one PARALLEL leg per ecosystem (matrix from `build`) ─────
  # Does the built plugin actually install/load in the REAL Claude Code / OpenCode binary, not
  # just look correct on disk? This is the ONLY job that loads the plugin in a live CLI, so it
  # GATES: a genuine load regression fails the pipeline (and, on main, blocks the release that
  # chains off CI success) instead of failing open. A transient registry hiccup is absorbed by
  # the pinned install's own retry+timeout; a real load failure surfaces as the pytest step going
  # red. fail-fast:false keeps one ecosystem's result independent of the others'.
  # A PEER of test/validate (needs only `build`): it fans out right after build for early signal,
  # rather than waiting on the unit suite. `mutation` (below) is what waits for smoke to go green.
  smoke:
    name: Smoke — ${{ matrix.target }}
    needs: [build]
    # Custom `if:` replaces the implicit `if: success()`, so a failed `build` must be excluded
    # explicitly (else this job would fan out against a broken/empty matrix). `!cancelled()` keeps
    # the clean skip on non-PR pushes.
    if: >-
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
      && !cancelled()
      && needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: make install

      # Pinned to the version verified when the check was written; the retry+timeout absorbs a
      # transient registry hiccup (a genuine outage, after 3 tries, fails only this ecosystem's
      # leg). A pin going stale is surfaced by Dependabot — see .github/dependabot.yml.
      # Matrix values are routed through env (not interpolated into the shell) so a fork PR that
      # edits a smoke.json can't inject a command into these run: steps.
      - name: Install ${{ matrix.cli }}
        env:
          INSTALL_METHOD: ${{ matrix.install_method }}
          NPM_PACKAGE: ${{ matrix.npm_package }}
          NPM_VERSION: ${{ matrix.npm_version }}
          INSTALL_URL: ${{ matrix.install_url }}
          INSTALL_FLAGS: ${{ matrix.install_flags }}
          CLI: ${{ matrix.cli }}
        run: make smoke-install

      # bash runs with `-eo pipefail` (GitHub default), so a red pytest propagates through `tee`
      # and fails the leg — the CLI `--version` above already failed the job if the binary is
      # absent, so this step can't silently all-skip to green.
      - name: Run ${{ matrix.target }} smoke check
        env:
          TEST: ${{ matrix.test }}
          TARGET: ${{ matrix.target }}
          DISABLE_AUTOUPDATER: "1"
          CLAUDE_CODE_ENABLE_TELEMETRY: "0"
        run: make smoke-run

      - name: Annotate a red run
        if: failure()
        env:
          TARGET: ${{ matrix.target }}
          CLI: ${{ matrix.cli }}
        run: make smoke-annotate

      - name: Upload smoke check results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-results-${{ matrix.target }}
          path: smoke-results-${{ matrix.target }}.txt

  # ── Mutation testing — every commit on PR branches (+ main), after the quick gates ────
  # Runs mutmut against the pure build layer (scripts/build/*) + hooks + tests/metrics/ and gates on a 90% kill rate. Runs on the
  # pull_request event (every commit pushed to a branch with an open PR) and on
  # main pushes (post-merge) — so feature-branch commits without a PR don't
  # burn CI minutes, and a SHA is never mutation-tested twice. Releases are cut
  # separately by release.yml on every merge to main.
  mutation:
    name: Mutation
    # Gate the expensive (~40 min) job behind ALL three quick gates — a red test, validate, or smoke
    # stops it before it burns minutes. NOTE: a custom `if:` REPLACES GitHub's implicit
    # `if: success()`, so gating on `needs` requires spelling out the success checks explicitly here —
    # otherwise this job would launch even when a need failed. `!cancelled()` lets it still skip
    # cleanly when smoke/mutation are skipped together on a non-PR push (same PR/main condition).
    needs: [test, validate, smoke]
    if: >-
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/main')
      && !cancelled()
      && needs.test.result == 'success'
      && needs.validate.result == 'success'
      && needs.smoke.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: make install

      - name: Cache tiktoken encodings
        uses: actions/cache@v6
        with:
          path: ~/.cache/tiktoken
          key: tiktoken-cl100k

      - name: Run mutation tests
        run: make test-mutation
        env:
          TIKTOKEN_CACHE_DIR: /home/runner/.cache/tiktoken

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutmut-results
          path: mutmut-results.txt
