name: CI

# Two triggers, two meanings — not a duplicate: a push run tests the BRANCH TIP on every
# commit (instant feedback, PR or not), a pull_request run tests the MERGE PREVIEW (the
# branch merged into main — catches conflict-adjacent breakage the tip can't show).
# The expensive mutation job stays gated to pull_request/main below.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ── Tests — always, on every branch ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Cache tiktoken encodings
        uses: actions/cache@v4
        with:
          path: ~/.cache/tiktoken
          key: tiktoken-cl100k

      - name: Run tests with coverage
        run: make test
        env:
          TIKTOKEN_CACHE_DIR: /home/runner/.cache/tiktoken

  # ── Mutation testing — every commit on PR branches (+ main), after tests ────
  # Runs mutmut against plugin/hooks/ + tests/metrics/ and gates on a 90% kill rate. Runs on the
  # pull_request event (every commit pushed to a branch with an open PR) and on
  # main pushes (post-merge) — so feature-branch commits without a PR don't
  # burn CI minutes, and a SHA is never mutation-tested twice. Releases are cut
  # separately by release.yml on every merge to main.
  mutation:
    name: Mutation
    needs: [test]
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Cache tiktoken encodings
        uses: actions/cache@v4
        with:
          path: ~/.cache/tiktoken
          key: tiktoken-cl100k

      - name: Run mutation tests
        run: make test-mutation
        env:
          TIKTOKEN_CACHE_DIR: /home/runner/.cache/tiktoken

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-results
          path: mutmut-results.txt

  # ── Validate the plugin package — manifests + single-source version ─────────
  # Gates packaging itself (marketplace-validate + version-check). Runs without a
  # Claude binary; the end-to-end install smoke stays an opt-in manual check.
  validate:
    name: Validate plugin package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Validate manifests and single-source version
        run: |
          python - <<'PY'
          import json, re
          mk = json.load(open(".claude-plugin/marketplace.json"))
          pl = json.load(open("plugin/.claude-plugin/plugin.json"))
          assert any(p.get("name") == "hercules" for p in mk["plugins"]), \
              "marketplace.json must list the hercules plugin"
          version = re.search(r'(?m)^version\s*=\s*"([^"]+)"', open("pyproject.toml").read()).group(1)
          assert version == pl["version"], f"version drift: pyproject {version} != plugin {pl['version']}"
          pkg = json.load(open("package.json"))
          assert pkg["version"] == version, f"version drift: package.json {pkg['version']} != pyproject {version}"
          print("plugin package valid; version", version)
          PY

  # ── Validate OpenCode artifacts are in sync with the Claude Code plugin source ─
  # Regenerates .opencode/ and opencode.json from plugin/, then fails if any committed
  # generated file differs. This guarantees a single source of truth in plugin/.
  opencode-sync:
    name: OpenCode artifact sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Regenerate OpenCode artifacts
        run: python scripts/generate_opencode.py

      - name: Fail if generated artifacts are out of sync
        run: |
          if [[ -n $(git status --porcelain .opencode opencode-plugin opencode.json package.json) ]]; then
            echo "OpenCode artifacts are out of sync with plugin/. Run scripts/generate_opencode.py and commit the result."
            git status --short .opencode opencode-plugin opencode.json package.json
            exit 1
          fi

      - name: Validate generated plugin entry point syntax
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check CommonJS plugin loads
        run: node --check opencode-plugin/hercules.js
