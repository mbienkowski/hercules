name: Nightly ecosystem smoke (@latest)

# The blocking smoke in ci.yml pins each CLI to a verified version so a transient upstream break
# can't red the merge pipeline. This nightly runs the SAME smokes against each CLI's @latest so a
# real upstream regression — or our pins going stale (Dependabot can't bump CLI pins in smoke.json)
# — is surfaced as a VISIBLE, non-blocking signal instead of rotting silently. It reports; it does
# not gate. A red run here means "investigate whether to bump the pin in src/targets/<eco>/smoke.json
# or file an upstream bug", not "block a merge".
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: # allow a manual run from the Actions tab

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # Same registry-driven discovery as ci.yml, so adding an ecosystem auto-extends the nightly too.
  discover:
    name: Discover ecosystems
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7

      - id: matrix
        name: Assemble the ecosystem smoke matrix from src/targets/*/smoke.json
        run: make smoke-matrix

  smoke-latest:
    name: Smoke @latest — ${{ matrix.target }}
    needs: [discover]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: make install

      # @latest on purpose — the whole point is to catch a newer CLI that breaks the shipped plugin.
      # CHANNEL=latest tells install_cli.sh to install @latest; a curl-installed CLI (Cursor) has no
      # version pin — its installer always fetches latest, exactly the drift this nightly surfaces.
      - name: Install ${{ matrix.cli }}@latest
        env:
          INSTALL_METHOD: ${{ matrix.install_method }}
          NPM_PACKAGE: ${{ matrix.npm_package }}
          INSTALL_URL: ${{ matrix.install_url }}
          INSTALL_FLAGS: ${{ matrix.install_flags }}
          CLI: ${{ matrix.cli }}
          CHANNEL: latest
        run: make smoke-install

      - name: Run ${{ matrix.target }} smoke against @latest
        env:
          TEST: ${{ matrix.test }}
          TARGET: ${{ matrix.target }}
          RESULT_PREFIX: smoke-latest
          DISABLE_AUTOUPDATER: "1"
          CLAUDE_CODE_ENABLE_TELEMETRY: "0"
        run: make smoke-run

      - name: Annotate a red nightly
        if: failure()
        env:
          TARGET: ${{ matrix.target }}
          CLI: ${{ matrix.cli }}
        run: make smoke-annotate-nightly

      - name: Upload @latest smoke results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-latest-${{ matrix.target }}
          path: smoke-latest-${{ matrix.target }}.txt
